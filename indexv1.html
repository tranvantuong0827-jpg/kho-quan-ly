<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Cá Cảnh Kim Phát - POS v2</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        body { font-family: -apple-system, sans-serif; background: #f1f5f9; }
        .hidden { display: none; }
        .tab-active { background: #1e40af !important; color: white !important; }
        ::-webkit-scrollbar { width: 4px; }
        ::-webkit-scrollbar-thumb { background: #cbd5e1; border-radius: 10px; }
    </style>
</head>
<body class="p-2 sm:p-4">

<div id="login-screen" class="max-w-md mx-auto mt-12 bg-white p-8 rounded-[2.5rem] shadow-2xl">
    <div class="text-center mb-8">
        <h1 class="text-3xl font-black text-blue-900 italic">KIM PHÁT</h1>
        <p class="text-[10px] font-bold text-slate-400 tracking-widest uppercase mt-1">Hệ Thống Quản Lý Cá Cảnh</p>
    </div>
    <div class="space-y-4">
        <input id="u" type="text" placeholder="Tên đăng nhập" class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-600 font-bold">
        <input id="p" type="password" placeholder="Mật khẩu" class="w-full bg-slate-50 p-4 rounded-2xl outline-none border-2 border-transparent focus:border-blue-600 font-bold">
        <button onclick="login()" id="btn-login" class="w-full bg-blue-700 text-white font-black py-4 rounded-2xl uppercase shadow-lg active:scale-95 transition-all">Đăng Nhập</button>
    </div>
</div>

<div id="main-app" class="hidden max-w-md mx-auto space-y-4 pb-20">
    <div class="flex justify-between items-center bg-white p-4 rounded-3xl shadow-sm">
        <div>
            <h2 class="font-black text-blue-900 italic text-lg uppercase">Kim Phát POS</h2>
            <p class="text-[10px] font-bold text-slate-500">NV: <span id="user-display" class="text-blue-600">---</span></p>
        </div>
        <button onclick="location.reload()" class="bg-red-50 text-red-500 px-3 py-2 rounded-xl text-[10px] font-black">THOÁT</button>
    </div>

    <div class="grid grid-cols-2 gap-3">
        <div class="bg-blue-800 p-4 rounded-[1.5rem] text-white shadow-md">
            <p class="text-[9px] font-bold uppercase opacity-70">Ngày hôm nay</p>
            <p id="rev-day" class="text-lg font-black italic">0đ</p>
        </div>
        <div class="bg-emerald-700 p-4 rounded-[1.5rem] text-white shadow-md">
            <p class="text-[9px] font-bold uppercase opacity-70">Tháng này</p>
            <p id="rev-month" class="text-lg font-black italic">0đ</p>
        </div>
    </div>

    <div class="bg-white p-5 rounded-[2rem] shadow-xl space-y-4">
        <div class="flex p-1 bg-slate-100 rounded-2xl gap-1">
            <button onclick="setMode('Bán hàng')" id="btn-ban" class="flex-1 py-3 rounded-xl font-black text-xs uppercase tab-active transition-all">🛍️ Bán Ra</button>
            <button onclick="setMode('Nhập hàng')" id="btn-nhap" class="flex-1 py-3 rounded-xl font-black text-xs uppercase text-slate-500 transition-all">📦 Nhập Kho</button>
        </div>

        <div id="ncc-wrap" class="hidden">
            <input id="common-ncc" type="text" placeholder="Nhà cung cấp (Bắt buộc)..." class="w-full bg-amber-50 p-4 rounded-2xl outline-none border-2 border-amber-100 font-bold text-sm">
        </div>

        <div id="items-list" class="space-y-3"></div>

        <button onclick="addNewRow()" class="w-full py-2 border-2 border-dashed border-slate-200 rounded-2xl text-slate-400 font-bold text-[10px] uppercase">+ THÊM MÓN</button>

        <div class="pt-4 border-t border-slate-50 space-y-3">
            <select id="p-method" class="w-full bg-slate-50 p-4 rounded-2xl font-bold text-slate-600 text-sm outline-none border-0">
                <option value="Tiền mặt">💵 Tiền mặt</option>
                <option value="Chuyển khoản">🏦 Chuyển khoản</option>
            </select>
            <div class="flex justify-between items-center px-2">
                <span class="font-bold text-slate-400 text-xs uppercase">TỔNG ĐƠN:</span>
                <span id="total-bill" class="text-2xl font-black text-red-600 italic">0đ</span>
            </div>
            <button onclick="submitData()" id="btn-save" class="w-full bg-blue-700 text-white font-black py-5 rounded-2xl shadow-xl uppercase text-lg">LƯU GIAO DỊCH</button>
        </div>
    </div>

    <div class="bg-white p-6 rounded-[2rem] shadow-lg">
        <h3 class="font-black text-slate-800 uppercase italic mb-3">Tồn Kho Hiện Tại</h3>
        <input type="text" onkeyup="searchStock(this.value)" placeholder="🔍 Tìm nhanh..." class="w-full bg-slate-100 p-4 rounded-2xl outline-none border-0 mb-4 text-sm font-medium">
        <div id="stock-container" class="space-y-3 max-h-64 overflow-y-auto pr-2">Đang tải...</div>
    </div>
</div>

<datalist id="sp-list"></datalist>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxNNftaSe-uB4OdaG0qLgNypSIgpLuOpM5cSIuGbSUY1sAhwshAJYTypwMWO7_6LhA_gA/exec";
    let currentUser = "", currentMode = "Bán hàng", productList = [], historyData = [];

    function fM(n) { return Number(n || 0).toLocaleString('vi-VN') + "đ"; }

    async function login() {
        const u = document.getElementById('u').value.trim(), p = document.getElementById('p').value.trim();
        if(!u || !p) return;
        document.getElementById('btn-login').innerText = "Đang xử lý...";
        try {
            const r = await fetch(`${SCRIPT_URL}?action=login&u=${u}&p=${p}`).then(res => res.json());
            if(r.status === 'success') {
                currentUser = u;
                document.getElementById('login-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('user-display').innerText = u;
                refreshAll();
            } else { Swal.fire('Lỗi', 'Sai thông tin!', 'error'); document.getElementById('btn-login').innerText = "Đăng Nhập"; }
        } catch(e) { Swal.fire('Lỗi', 'Kiểm tra Link Script!', 'error'); }
    }

    async function refreshAll() {
        productList = await fetch(`${SCRIPT_URL}?action=getProducts`).then(r => r.json());
        historyData = await fetch(`${SCRIPT_URL}?action=getHistory`).then(r => r.json());
        document.getElementById('sp-list').innerHTML = productList.map(p => `<option value="${p.ten}">`).join('');
        renderStock();
        updateRevenue();
        if(document.getElementById('items-list').children.length === 0) addNewRow();
    }

    function renderStock(kw = "") {
        document.getElementById('stock-container').innerHTML = productList
            .filter(p => p.ten.toLowerCase().includes(kw.toLowerCase()))
            .map(p => `
                <div class="flex justify-between items-center py-2 border-b border-slate-50">
                    <div><p class="text-[12px] font-black text-blue-900 uppercase">${p.id || '---'}</p><p class="text-[10px] font-bold text-slate-400 uppercase">${p.ten}</p></div>
                    <div class="text-right"><p class="font-black text-lg ${p.ton_kho <= 5 ? 'text-red-600 animate-pulse' : 'text-emerald-600'}">${p.ton_kho}</p></div>
                </div>
            `).join('');
    }

    function setMode(m) {
        currentMode = m;
        document.getElementById('btn-ban').className = m === 'Bán hàng' ? 'flex-1 py-3 rounded-xl font-black text-xs uppercase tab-active' : 'flex-1 py-3 rounded-xl font-black text-xs uppercase text-slate-500';
        document.getElementById('btn-nhap').className = m === 'Nhập hàng' ? 'flex-1 py-3 rounded-xl font-black text-xs uppercase tab-active' : 'flex-1 py-3 rounded-xl font-black text-xs uppercase text-slate-500';
        document.getElementById('ncc-wrap').classList.toggle('hidden', m === 'Bán hàng');
        reCalc();
    }

    function addNewRow() {
        const id = Date.now();
        const html = `
            <div id="row-${id}" class="bg-slate-50 p-4 rounded-2xl relative border border-slate-100">
                <button onclick="this.parentElement.remove();reCalc()" class="absolute -top-2 -right-2 bg-white text-red-500 w-6 h-6 rounded-full shadow-md font-bold text-xs flex items-center justify-center border">✕</button>
                <input list="sp-list" onchange="fillRow(${id}, this.value)" class="w-full bg-transparent border-b border-slate-200 mb-3 py-1 font-bold outline-none uppercase text-sm" placeholder="Tên sản phẩm...">
                <div class="grid grid-cols-2 gap-4">
                    <div><label class="text-[8px] font-bold text-slate-400 block">SỐ LƯỢNG</label><input type="number" onchange="reCalc()" class="q-val w-full bg-transparent font-black text-lg outline-none" value="1"></div>
                    <div><label class="text-[8px] font-bold text-slate-400 block uppercase">Đơn giá</label><input type="number" onchange="reCalc()" class="p-val w-full bg-transparent font-black text-lg text-blue-700 outline-none" value="0"></div>
                </div>
                <div id="hint-${id}" class="text-[9px] font-bold text-slate-400 mt-1 italic">Kho: --</div>
            </div>`;
        document.getElementById('items-list').insertAdjacentHTML('beforeend', html);
    }

    function fillRow(id, name) {
        const p = productList.find(x => x.ten === name);
        if(p) {
            const row = document.getElementById(`row-${id}`);
            row.querySelector('.p-val').value = (currentMode === "Bán hàng") ? p.gia_ban : 0;
            const hint = document.getElementById(`hint-${id}`);
            hint.innerText = "Hiện có: " + p.ton_kho;
            hint.setAttribute('data-stock', p.ton_kho);
        }
        reCalc();
    }

    function reCalc() {
        let total = 0;
        document.querySelectorAll('#items-list > div').forEach(row => {
            total += Number(row.querySelector('.q-val').value) * Number(row.querySelector('.p-val').value);
        });
        document.getElementById('total-bill').innerText = fM(total);
    }

    async function submitData() {
        const items = [];
        let stockErr = "";
        const rows = document.querySelectorAll('#items-list > div');
        
        rows.forEach(r => {
            const ten = r.querySelector('input').value, sl = Number(r.querySelector('.q-val').value), gia = Number(r.querySelector('.p-val').value);
            const curStock = Number(r.querySelector('[data-stock]')?.getAttribute('data-stock') || 0);

            if(ten && sl > 0) {
                if(currentMode === "Bán hàng" && sl > curStock) stockErr = `Món "${ten}" chỉ còn ${curStock}, không đủ để bán!`;
                items.push({ ten, sl, gia, ncc: document.getElementById('common-ncc').value });
            }
        });

        if(stockErr) return Swal.fire('Lỗi kho', stockErr, 'error');
        if(items.length === 0) return;
        if(currentMode === "Nhập hàng" && !document.getElementById('common-ncc').value.trim()) return Swal.fire('Thiếu NCC', 'Vui lòng nhập Nhà cung cấp!', 'warning');

        const btn = document.getElementById('btn-save');
        btn.disabled = true; btn.innerText = "ĐANG LƯU...";

        try {
            const res = await fetch(SCRIPT_URL, { 
                method: 'POST', 
                body: JSON.stringify({ action: "saveOrder", type: currentMode, user: currentUser, method: document.getElementById('p-method').value, items: items }) 
            }).then(r => r.text());

            if(res === "Success") {
                Swal.fire({ title: 'Thành công!', icon: 'success', timer: 1000, showConfirmButton: false });
                document.getElementById('items-list').innerHTML = "";
                document.getElementById('common-ncc').value = "";
                refreshAll();
            } else { Swal.fire('Lỗi', res, 'error'); }
        } catch(e) { Swal.fire('Lỗi', 'Mất kết nối!', 'error'); }
        finally { btn.disabled = false; btn.innerText = "LƯU GIAO DỊCH"; }
    }

    function updateRevenue() {
        const today = new Date().toLocaleDateString('vi-VN');
        const month = new Date().getMonth();
        let d = 0, m = 0;
        historyData.forEach(h => {
            const date = new Date(h["thời gian"] || h.thoigian);
            if((h["loại"] || h.loi) === "Bán hàng") {
                const total = Number(h["thành tiền"] || h.thanhtien);
                if(date.toLocaleDateString('vi-VN') === today) d += total;
                if(date.getMonth() === month) m += total;
            }
        });
        document.getElementById('rev-day').innerText = fM(d);
        document.getElementById('rev-month').innerText = fM(m);
    }
    function searchStock(v) { renderStock(v); }
</script>
</body>
</html>
