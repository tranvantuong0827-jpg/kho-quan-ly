<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIM PHÁT CÁ CẢNH - v12.6</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --ban: #28a745; --nhap: #007bff; --tra: #dc3545; --tai-chinh: #6c757d; }
        body { background: #f0f2f5; font-family: -apple-system, sans-serif; }
        .hidden { display: none; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid var(--nhap); border-radius: 50%; width: 45px; height: 45px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .order-row { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 8px solid #ccc; box-shadow: 0 4px 6px rgba(0,0,0,0.05); }
        .ban-theme { border-left-color: var(--ban) !important; }
        .nhap-theme { border-left-color: var(--nhap) !important; }
        .tra-theme { border-left-color: var(--tra) !important; }
        .stat-card { background: #fff; border-radius: 15px; padding: 15px; border-top: 4px solid var(--tai-chinh); }
        .sidebar-item { padding: 15px 20px; border: none; background: none; width: 100%; text-align: left; border-bottom: 1px solid #f1f1f1; font-weight: 600; }
        .fw-black { font-weight: 900; }
        .stat-val { font-weight: 900; font-size: 1.1rem; }
    </style>
</head>
<body>

<div id="login-box" class="container py-5">
    <div class="row justify-content-center">
        <div class="col-11 col-md-4 card p-4 text-center shadow-lg border-0 rounded-5">
            <h3 class="fw-black text-primary mb-1 italic">KIM PHÁT</h3>
            <h5 class="fw-bold text-secondary mb-4">CÁ CẢNH</h5>
            <input type="text" id="u" class="form-control mb-3 py-3 rounded-4" placeholder="Tài khoản">
            <input type="password" id="p" class="form-control mb-3 py-3 rounded-4" placeholder="Mật khẩu">
            <button onclick="login()" id="btn-login" class="btn btn-primary w-100 py-3 fw-bold rounded-pill">ĐĂNG NHẬP</button>
        </div>
    </div>
</div>

<div id="loading-screen" class="hidden container py-5 text-center">
    <div class="loader"></div>
    <h5 class="fw-bold text-primary animate-pulse italic">HỆ THỐNG ĐANG TẢI...</h5>
</div>

<div id="main-app" class="hidden">
    <nav class="bg-white p-3 d-flex justify-content-between align-items-center sticky-top shadow-sm">
        <button class="fs-3 border-0 bg-transparent" data-bs-toggle="offcanvas" data-bs-target="#menu">☰</button>
        <span class="small fw-bold">NV: <span id="u-display" class="text-primary">---</span></span>
        <div id="clock-header" class="fw-bold text-primary small"></div>
    </nav>
    <div class="p-3" id="main-content">
        <div id="dashboard" class="card p-4 text-center shadow-sm border-0 rounded-4">
            <h6 id="date-now" class="text-muted mb-3"></h6>
            <div class="alert alert-danger py-2 px-3 small fw-bold rounded-pill">🔥 KHO SẮP HẾT: <span id="low-count">0</span> món</div>
            <div id="low-stock-list" class="mt-3 text-start"></div>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-start" id="menu">
    <div class="offcanvas-header bg-dark text-white">
        <h6 class="fw-bold m-0 uppercase">MENU QUẢN LÝ</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
        <button class="sidebar-item" onclick="openTab('ban-hang')">🛍️ Bán Hàng</button>
        <button id="nhap-btn-menu" class="sidebar-item hidden text-primary" onclick="openTab('nhap-hang')">📦 Nhập Hàng</button>
        <button class="sidebar-item text-danger" onclick="openTab('tra-hang')">↩️ Trả Hàng</button>
        <hr class="m-0">
        <button class="sidebar-item" onclick="openTab('lich-su')">📜 Nhật Ký Giao Dịch</button>
        <button class="sidebar-item" onclick="openTab('bao-cao-kho')">📊 Kiểm Tra Kho</button>
        <button id="admin-btn-menu" class="sidebar-item hidden bg-secondary text-white" onclick="openTab('loi-nhuan')">💰 Tài Chính & Lãi</button>
        <div class="p-3 mt-auto"><button onclick="location.reload()" class="btn btn-outline-secondary btn-sm w-100 rounded-pill">Đăng xuất</button></div>
    </div>
</div>

<script>
    // LINK SCRIPT MỚI NHẤT CỦA TƯỜNG
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxcmYSyi8G4sA6W5KmNcKy5966gmYd7JT4-s1fd0le3IPcABdNbX0kIZaAUHcrnVE41gQ/exec";
    let currentUser = "", currentRole = "", productList = [], historyData = [];

    function fM(n) { return Number(n || 0).toLocaleString('vi-VN') + " đ"; }

    async function login() {
        const u = document.getElementById('u').value.trim(), p = document.getElementById('p').value.trim();
        if(!u || !p) return Swal.fire('Nhập đủ thông tin!', '', 'warning');
        const btn = document.getElementById('btn-login');
        btn.innerText = "Xác thực..."; btn.disabled = true;
        try {
            const r = await fetch(`${SCRIPT_URL}?action=login&u=${u}&p=${p}`).then(res => res.json());
            if(r.status === 'success') {
                currentUser = u; currentRole = r.role;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('loading-screen').classList.remove('hidden');
                await Promise.all([refreshProducts(), refreshHistory()]);
                document.getElementById('loading-screen').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('u-display').innerText = currentUser;
                if(currentRole === 'admin') {
                    document.getElementById('admin-btn-menu').classList.remove('hidden');
                    document.getElementById('nhap-btn-menu').classList.remove('hidden');
                }
            } else { 
                Swal.fire('Thất bại', 'Sai mật khẩu!', 'error'); 
                btn.innerText = "ĐĂNG NHẬP"; btn.disabled = false;
            }
        } catch(e) { Swal.fire('Lỗi kết nối!', 'Vui lòng kiểm tra lại Deploy', 'error'); btn.disabled = false; }
    }

    async function refreshProducts() { 
        productList = await fetch(`${SCRIPT_URL}?action=getProducts`).then(r => r.json()); 
        updateDashboard(); 
    }
    async function refreshHistory() { 
        historyData = await fetch(`${SCRIPT_URL}?action=getHistory`).then(r => r.json()); 
    }

    function updateDashboard() {
        const low = productList.filter(p => Number(p.ton_kho || p.tonkho || 0) < 5);
        document.getElementById('low-count').innerText = low.length;
        document.getElementById('low-stock-list').innerHTML = low.slice(0,10).map(p => `<div class="d-flex justify-content-between border-bottom py-2 small"><span>${p.ten || p.tensp}</span><b class="text-danger">${p.ton_kho || p.tonkho}</b></div>`).join('');
    }

    function openTab(name) {
        const off = bootstrap.Offcanvas.getInstance(document.getElementById('menu')); if(off) off.hide();
        const content = document.getElementById('main-content');
        if(['ban-hang', 'nhap-hang', 'tra-hang'].includes(name)) {
            const type = name === 'ban-hang' ? "Bán hàng" : (name === 'nhap-hang' ? "Nhập hàng" : "Trả hàng");
            const theme = name === 'ban-hang' ? "ban-theme" : (name === 'nhap-hang' ? "nhap-theme" : "tra-theme");
            content.innerHTML = `
                <h5 class="fw-black mb-3 text-center italic text-uppercase">${type}</h5>
                ${name === 'nhap-hang' ? '<input type="text" id="common-ncc" class="form-control mb-3 py-3 border-primary fw-bold" placeholder="NHÀ CUNG CẤP (BẮT BUỘC)...">':''}
                <div id="items-list"></div>
                <button onclick="addRow('${theme}', '${name}')" class="btn btn-outline-secondary w-100 mb-3 py-2 fw-bold">+ THÊM SẢN PHẨM</button>
                <div class="card p-3 shadow-sm border-0 rounded-4">
                    <select id="p-method" class="form-select mb-3 rounded-3"><option value="Tiền mặt">💵 Tiền mặt</option><option value="Chuyển khoản">🏦 Chuyển khoản</option></select>
                    <div class="d-flex justify-content-between mb-3 align-items-center"><span class="fw-bold">TỔNG CỘNG:</span><span id="total-bill" class="fs-4 fw-black text-danger">0 đ</span></div>
                    <button id="btn-submit" onclick="submitOrder('${type}')" class="btn btn-lg w-100 fw-black rounded-pill ${name==='ban-hang'?'btn-success':(name==='nhap-hang'?'btn-primary':'btn-danger')}">XÁC NHẬN GIAO DỊCH</button>
                </div>`;
            addRow(theme, name);
        } 
        else if(name === 'lich-su') renderHistory();
        else if(name === 'bao-cao-kho') renderStock();
        else if(name === 'loi-nhuan') renderFinance();
    }

    function addRow(theme, tabName) {
        const id = Date.now();
        const row = `<div class="order-row ${theme} row g-1" id="row-${id}">
            <div class="col-12 mb-2"><input list="plist" onchange="updateRow(${id}, this.value, '${tabName}')" class="form-control rounded-3 fw-bold" placeholder="Chọn tên món..."></div>
            <div class="col-4"><small class="text-muted d-block text-center">SL</small><input type="number" id="q-${id}" onchange="calc()" class="form-control text-center rounded-3 fw-bold" value="1"></div>
            <div class="col-6"><small class="text-muted d-block text-center">Đơn giá</small><input type="number" id="p-input-${id}" onchange="calc()" class="form-control text-center text-primary fw-black rounded-3" value="0"></div>
            <div class="col-2 text-center pt-3"><button onclick="this.parentElement.parentElement.remove();calc()" class="btn text-danger fs-4">✕</button></div>
            <div class="col-12 text-center small text-muted mt-1" id="s-${id}" data-stock="0">Kho hiện tại: --</div>
        </div>`;
        document.getElementById('items-list').insertAdjacentHTML('beforeend', row);
        if(!document.getElementById('plist')) {
            const dl = document.createElement('datalist'); dl.id = 'plist'; document.body.appendChild(dl);
        }
        document.getElementById('plist').innerHTML = productList.map(p => `<option value="${p.ten || p.tensp}">`).join('');
    }

    function updateRow(id, val, tabName) {
        const p = productList.find(x => (x.ten || x.tensp) === val);
        const sEl = document.getElementById(`s-${id}`);
        if(p) {
            const stock = Number(p.ton_kho || p.tonkho || 0);
            document.getElementById(`p-input-${id}`).value = (tabName === 'nhap-hang') ? (p.gia_nhap || 0) : (p.gia_ban || 0);
            sEl.innerText = "Kho hiện tại: " + stock;
            sEl.setAttribute('data-stock', stock);
        } else {
            sEl.innerText = "Món mới hoàn toàn ✨";
            sEl.setAttribute('data-stock', '0');
        }
        calc();
    }

    function calc() {
        let t = 0;
        document.querySelectorAll('.order-row').forEach(r => {
            const id = r.id.split('-')[1];
            t += (Number(document.getElementById(`q-${id}`).value) * Number(document.getElementById(`p-input-${id}`).value));
        });
        document.getElementById('total-bill').innerText = fM(t);
    }

    async function submitOrder(type) {
        const items = []; let err = "";
        const nccInput = document.getElementById('common-ncc');
        const nccValue = nccInput ? nccInput.value.trim() : "";
        
        const rows = document.querySelectorAll('.order-row');
        if(!rows.length) return;

        rows.forEach(r => {
            const id = r.id.split('-')[1];
            const ten = r.querySelector('input').value.trim();
            const sl = Number(document.getElementById(`q-${id}`).value);
            const gia = Number(document.getElementById(`p-input-${id}`).value);
            const stock = Number(document.getElementById(`s-${id}`).getAttribute('data-stock') || 0);

            if(!ten || sl <= 0) err = "Vui lòng nhập đủ Tên và SL!";
            if(type === 'Bán hàng' && sl > stock) err = `Món "${ten}" không đủ tồn kho (Chỉ còn ${stock})`;
            
            items.push({ten, sl, gia, ncc: nccValue});
        });

        if(err) return Swal.fire(err, '', 'error');
        if(type === 'Nhập hàng' && !nccValue) return Swal.fire('Thiếu NCC', 'Vui lòng nhập Nhà Cung Cấp!', 'warning');

        const btn = document.getElementById('btn-submit');
        btn.disabled = true; btn.innerText = "ĐANG LƯU...";

        try {
            const res = await fetch(SCRIPT_URL, {
                method: 'POST',
                body: JSON.stringify({ action: "saveOrder", type, user: currentUser, method: document.getElementById('p-method').value, items })
            }).then(r => r.text());

            if(res.includes("Success")) {
                Swal.fire({title:'Đã lưu thành công!', icon:'success', timer:1200, showConfirmButton:false});
                await Promise.all([refreshProducts(), refreshHistory()]);
                openTab('ban-hang');
            } else { Swal.fire('Lỗi từ Server', res, 'error'); btn.disabled = false; }
        } catch(e) { Swal.fire('Lỗi kết nối!', 'Vui lòng kiểm tra Internet', 'error'); btn.disabled = false; }
    }

    function renderFinance() {
        const today = new Date().toLocaleDateString('vi-VN');
        let dRev = 0, dProfit = 0, dCost = 0, mRev = 0, mProfit = 0;
        historyData.forEach(x => {
            const date = new Date(x["thời gian"] || x.thoigian).toLocaleDateString('vi-VN');
            const total = Number(x["thành tiền"] || x.thanhtien || 0);
            const lãi = Number(x["loi_nhuan"] || x.loinhuan || 0);
            const chi = Number(x["chi phí nhập"] || x.chiphi || 0);

            if(date === today) { dRev += total; dProfit += lãi; dCost += chi; }
            if(new Date(x["thời gian"] || x.thoigian).getMonth() === new Date().getMonth()) { mRev += total; mProfit += lãi; }
        });
        document.getElementById('main-content').innerHTML = `
            <h5 class="fw-black mb-3 text-primary text-center">💰 TÌNH HÌNH TÀI CHÍNH</h5>
            <div class="row g-2">
                <div class="col-6"><div class="stat-card"><small>Doanh thu ngày</small><div class="stat-val text-primary">${fM(dRev)}</div></div></div>
                <div class="col-6"><div class="stat-card"><small>Vốn nhập ngày</small><div class="stat-val text-danger">${fM(dCost)}</div></div></div>
                <div class="col-12"><div class="stat-card" style="border-top-color:var(--ban)"><small>Lợi nhuận ngày</small><div class="stat-val text-success">${fM(dProfit)}</div></div></div>
                <div class="col-12 mt-2"><div class="stat-card bg-light"><small>Doanh thu tháng này</small><div class="stat-val text-primary">${fM(mRev)}</div></div></div>
                <div class="col-12"><div class="stat-card bg-light" style="border-top-color:var(--ban)"><small>Lợi nhuận tháng này</small><div class="stat-val text-success">${fM(mProfit)}</div></div></div>
            </div>`;
    }

    function renderHistory() {
        const list = [...historyData].reverse().slice(0,30);
        document.getElementById('main-content').innerHTML = `<h5 class="fw-black mb-3 text-primary text-center">📜 NHẬT KÝ GIAO DỊCH</h5>` + 
            list.map(x => `<div class="card p-3 mb-2 border-0 shadow-sm small rounded-4">
                <div class="d-flex justify-content-between border-bottom pb-1 mb-1">
                    <b class="${(x["loại"] || '').includes('Nhập') ? 'text-primary' : 'text-success'}">${(x["loại"] || 'GIAO DỊCH').toUpperCase()}</b>
                    <span class="text-muted" style="font-size:0.7rem">${new Date(x["thời gian"]).toLocaleString('vi-VN')}</span>
                </div>
                <div class="fw-black text-uppercase">${x["tên sp"] || x.ten} <span class="text-muted fw-normal">x${x.sl}</span></div>
                <div class="d-flex justify-content-between mt-1">
                    <span>${x["pt thanh toán"] || x.method || '---'} ${x["nhà cung cấp"] || x.ncc ? '| NCC: '+(x["nhà cung cấp"] || x.ncc) : ''}</span>
                    <b class="text-success">${fM(Math.abs(x["thành tiền"]))}</b>
                </div>
            </div>`).join('');
    }

    function renderStock() {
        document.getElementById('main-content').innerHTML = `<h5 class="fw-black mb-3 text-primary text-center">📊 KIỂM TRA TỒN KHO</h5>
            <input type="text" onkeyup="filterStock(this.value)" class="form-control mb-3 rounded-pill px-4 shadow-sm" placeholder="🔍 Tìm tên món hoặc mã...">
            <div id="stock-list-container">
                ${productList.map(p => `<div class="card p-3 mb-2 border-0 shadow-sm d-flex flex-row justify-content-between align-items-center stock-item rounded-4">
                    <div><div class="fw-black text-primary">${p.id || '---'}</div><div class="text-muted text-uppercase small fw-bold">${p.ten || p.tensp}</div></div>
                    <span class="badge ${Number(p.ton_kho || p.tonkho) < 5 ? 'bg-danger' : 'bg-success'} rounded-pill px-3 py-2">${p.ton_kho || p.tonkho} ${p.dvt || ''}</span>
                </div>`).join('')}
            </div>`;
    }

    function filterStock(v) {
        document.querySelectorAll('.stock-item').forEach(i => i.style.display = i.innerText.toLowerCase().includes(v.toLowerCase()) ? "flex" : "none");
    }

    setInterval(() => {
        const n = new Date(); document.getElementById('clock-header').innerText = n.toLocaleTimeString('vi-VN');
        if(document.getElementById('date-now')) document.getElementById('date-now').innerText = n.toLocaleDateString('vi-VN', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    }, 1000);
</script>
</body>
</html>
