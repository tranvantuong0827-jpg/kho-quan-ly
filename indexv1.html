<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>KIM PHÁT CÁ CẢNH - v13.0</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --ban: #28a745; --nhap: #007bff; --tra: #dc3545; --tai-chinh: #6c757d; }
        body { background: #f0f2f5; font-family: -apple-system, sans-serif; }
        .hidden { display: none; }
        .order-row { background: #fff; padding: 15px; border-radius: 15px; margin-bottom: 12px; border-left: 8px solid #ccc; }
        .stat-card { background: #fff; border-radius: 15px; padding: 15px; border-top: 4px solid var(--tai-chinh); margin-bottom: 10px; }
        .stat-val { font-weight: 900; font-size: 1.1rem; }
        .sidebar-item { padding: 15px 20px; border: none; background: none; width: 100%; text-align: left; border-bottom: 1px solid #f1f1f1; font-weight: 600; }
    </style>
</head>
<body>

<div id="login-box" class="container py-5">
    <div class="row justify-content-center">
        <div class="col-11 col-md-4 card p-4 text-center shadow-lg border-0 rounded-5">
            <h3 class="fw-bold text-primary mb-4">KIM PHÁT CÁ CẢNH v1</h3>
            <input type="text" id="u" class="form-control mb-3 py-3 rounded-4" placeholder="Tài khoản">
            <input type="password" id="p" class="form-control mb-3 py-3 rounded-4" placeholder="Mật khẩu">
            <button onclick="login()" id="btn-login" class="btn btn-primary w-100 py-3 fw-bold rounded-pill">ĐĂNG NHẬP</button>
        </div>
    </div>
</div>

<div id="main-app" class="hidden">
    <nav class="bg-white p-3 d-flex justify-content-between align-items-center sticky-top shadow-sm">
        <button class="fs-3 border-0 bg-transparent" data-bs-toggle="offcanvas" data-bs-target="#menu">☰</button>
        <span class="small fw-bold">NV: <span id="u-display" class="text-primary">---</span></span>
        <div id="clock-header" class="fw-bold small"></div>
    </nav>
    <div class="p-3" id="main-content"></div>
</div>

<div class="offcanvas offcanvas-start" id="menu">
    <div class="offcanvas-header bg-dark text-white"><h6>MENU QUẢN LÝ</h6><button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button></div>
    <div class="offcanvas-body p-0">
        <button class="sidebar-item" onclick="openTab('ban-hang')">🛍️ Bán Hàng</button>
        <button id="nhap-btn-menu" class="sidebar-item hidden" onclick="openTab('nhap-hang')">📦 Nhập Hàng</button>
        <button class="sidebar-item" onclick="openTab('lich-su')">📜 Nhật Ký</button>
        <button class="sidebar-item" onclick="openTab('bao-cao-kho')">📊 Kho Hàng</button>
        <button id="admin-btn-menu" class="sidebar-item hidden" onclick="openTab('loi-nhuan')">💰 Tài Chính</button>
    </div>
</div>

<script>
    // COPY URL MỚI SAU KHI DEPLOY DÁN VÀO ĐÂY
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxQaPGmiGb2pA2oH4ONMwxRG2DvnR-VTraU6SyMVrVjswn_7fjbXJ62TkLSjMYZEeueiA/exec";
    let currentUser = "", currentRole = "", productRaw = [], historyRaw = [];

    function fM(n) { return Number(n || 0).toLocaleString('vi-VN') + " đ"; }

    async function login() {
        const u = document.getElementById('u').value, p = document.getElementById('p').value;
        const btn = document.getElementById('btn-login');
        btn.innerText = "Đang tải..."; btn.disabled = true;
        try {
            const r = await fetch(`${SCRIPT_URL}?action=login&u=${u}&p=${p}`).then(res => res.json());
            if(r.status === 'success') {
                currentUser = u; currentRole = r.role;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('main-app').classList.remove('hidden');
                document.getElementById('u-display').innerText = u;
                if(r.role === 'admin') {
                    document.getElementById('admin-btn-menu').classList.remove('hidden');
                    document.getElementById('nhap-btn-menu').classList.remove('hidden');
                }
                await refreshData();
                openTab('ban-hang');
            } else { Swal.fire('Lỗi', 'Sai mật khẩu!', 'error'); btn.innerText = "ĐĂNG NHẬP"; btn.disabled = false; }
        } catch(e) { Swal.fire('Lỗi kết nối', 'Kiểm tra lại Deploy!', 'error'); btn.disabled = false; }
    }

    async function refreshData() {
        productRaw = await fetch(`${SCRIPT_URL}?action=getProducts`).then(r => r.json());
        historyRaw = await fetch(`${SCRIPT_URL}?action=getHistory`).then(r => r.json());
    }

    function openTab(name) {
        const off = bootstrap.Offcanvas.getInstance(document.getElementById('menu')); if(off) off.hide();
        const content = document.getElementById('main-content');
        if(name === 'bao-cao-kho') renderStock(content);
        else if(name === 'lich-su') renderHistory(content);
        else if(name === 'loi-nhuan') renderFinance(content);
        else if(name === 'ban-hang' || name === 'nhap-hang') renderOrder(content, name);
    }

    function renderStock(container) {
        let html = `<h5 class="fw-bold text-center mb-3">📊 TỒN KHO</h5>`;
        productRaw.values.forEach(p => {
            html += `<div class="card p-3 mb-2 border-0 shadow-sm d-flex flex-row justify-content-between">
                <div><b>${p[1]}</b><br><small class="text-muted">${p[0]}</small></div>
                <span class="badge ${p[3] < 5 ? 'bg-danger':'bg-success'} rounded-pill pt-2">${p[3]} ${p[2]}</span>
            </div>`;
        });
        container.innerHTML = html;
    }

    function renderHistory(container) {
        let html = `<h5 class="fw-bold text-center mb-3">📜 NHẬT KÝ</h5>`;
        [...historyRaw.values].reverse().slice(0,20).forEach(h => {
            html += `<div class="card p-3 mb-2 border-0 shadow-sm small">
                <div class="d-flex justify-content-between"><b>${h[2]}</b> <small>${new Date(h[0]).toLocaleString('vi-VN')}</small></div>
                <div>${h[3]} x ${h[4]}</div>
                <div class="d-flex justify-content-between text-success"><span>${h[12] || ''}</span> <b>${fM(Math.abs(h[6]))}</b></div>
            </div>`;
        });
        container.innerHTML = html;
    }

    function renderFinance(container) {
        let dRev = 0, dProfit = 0, dCost = 0;
        const today = new Date().toLocaleDateString('vi-VN');
        historyRaw.values.forEach(h => {
            if(new Date(h[0]).toLocaleDateString('vi-VN') === today) {
                dRev += Number(h[6] || 0); dProfit += Number(h[10] || 0); dCost += Number(h[11] || 0);
            }
        });
        container.innerHTML = `
            <h5 class="fw-bold text-center mb-3">💰 TÀI CHÍNH HÔM NAY</h5>
            <div class="stat-card"><small>Doanh thu</small><div class="stat-val text-primary">${fM(dRev)}</div></div>
            <div class="stat-card"><small>Vốn nhập</small><div class="stat-val text-danger">${fM(dCost)}</div></div>
            <div class="stat-card" style="border-top-color:green"><small>Lợi nhuận</small><div class="stat-val text-success">${fM(dProfit)}</div></div>`;
    }

    function renderOrder(container, type) {
        container.innerHTML = `<h5 class="text-center fw-bold">${type==='ban-hang'?'🛍️ BÁN HÀNG':'📦 NHẬP HÀNG'}</h5><div id="items-list"></div><button onclick="addOrderRow()" class="btn btn-outline-primary w-100 mb-3">+ Thêm món</button><button onclick="saveOrder('${type}')" id="btn-save" class="btn btn-success w-100 py-3">XÁC NHẬN LƯU</button>`;
        addOrderRow();
    }
    // Các hàm phụ trợ khác giữ nguyên logic của bạn...
    function addOrderRow() {
        const id = Date.now();
        const html = `<div class="order-row border-primary mb-2 p-2 bg-white rounded-3 shadow-sm" id="row-${id}">
            <input list="plist" class="form-control mb-1 fw-bold" placeholder="Tên sản phẩm..." id="t-${id}">
            <div class="row g-1">
                <div class="col-4"><input type="number" class="form-control" placeholder="SL" id="q-${id}" value="1"></div>
                <div class="col-6"><input type="number" class="form-control" placeholder="Giá" id="p-${id}"></div>
                <div class="col-2"><button onclick="document.getElementById('row-${id}').remove()" class="btn btn-danger w-100">X</button></div>
            </div>
        </div>`;
        document.getElementById('items-list').insertAdjacentHTML('beforeend', html);
        if(!document.getElementById('plist')) {
            const dl = document.createElement('datalist'); dl.id = 'plist'; document.body.appendChild(dl);
            dl.innerHTML = productRaw.values.map(p => `<option value="${p[1]}">`).join('');
        }
    }

    async function saveOrder(type) {
        const items = [];
        document.querySelectorAll('.order-row').forEach(r => {
            const id = r.id.split('-')[1];
            items.push({ ten: document.getElementById(`t-${id}`).value, sl: Number(document.getElementById(`q-${id}`).value), gia: Number(document.getElementById(`p-${id}`).value) });
        });
        const btn = document.getElementById('btn-save'); btn.disabled = true; btn.innerText = "Đang lưu...";
        const res = await fetch(SCRIPT_URL, { method: 'POST', body: JSON.stringify({ type: type==='ban-hang'?'Bán hàng':'Nhập hàng', user: currentUser, method: 'Tiền mặt', items }) }).then(r => r.text());
        if(res.includes("Success")) {
            Swal.fire('Xong!', 'Đã lưu vào kho và lịch sử', 'success');
            await refreshData();
            openTab('ban-hang');
        } else { Swal.fire('Lỗi', res, 'error'); btn.disabled = false; }
    }

    setInterval(() => { document.getElementById('clock-header').innerText = new Date().toLocaleTimeString('vi-VN'); }, 1000);
</script>
</body>
</html>
