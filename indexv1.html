<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>POS Pro Max v12 - Aquarium</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <style>
        :root { --ban: #28a745; --nhap: #007bff; --tra: #dc3545; --tai-chinh: #6c757d; }
        body { background: #f0f2f5; font-family: -apple-system, sans-serif; }
        .hidden { display: none; }
        .loader { border: 5px solid #f3f3f3; border-top: 5px solid var(--nhap); border-radius: 50%; width: 50px; height: 50px; animation: spin 1s linear infinite; margin: 20px auto; }
        @keyframes spin { 0% { transform: rotate(0deg); } 100% { transform: rotate(360deg); } }
        .order-row { background: #fff; padding: 15px; border-radius: 12px; margin-bottom: 10px; border-left: 8px solid #ccc; box-shadow: 0 2px 5px rgba(0,0,0,0.05); }
        .ban-theme { border-left-color: var(--ban) !important; }
        .nhap-theme { border-left-color: var(--nhap) !important; }
        .tra-theme { border-left-color: var(--tra) !important; }
        .stat-card { background: #fff; border-radius: 15px; padding: 15px; border-top: 4px solid var(--tai-chinh); }
        .stat-val { font-size: 1.1rem; font-weight: bold; }
        .sidebar-item { padding: 12px 20px; border: none; background: none; width: 100%; text-align: left; border-bottom: 1px solid #f1f1f1; }
    </style>
</head>
<body>

<div id="login-box" class="container py-5">
    <div class="row justify-content-center">
        <div class="col-11 col-md-4 card p-4 text-center shadow-lg border-0" style="border-radius: 20px;">
            <h3 class="fw-bold text-primary mb-4 italic">POS AQUARIUM</h3>
            <input type="text" id="u" class="form-control mb-3 py-3" placeholder="Tài khoản">
            <input type="password" id="p" class="form-control mb-3 py-3" placeholder="Mật khẩu">
            <button onclick="login()" id="btn-login" class="btn btn-primary w-100 py-3 fw-bold rounded-pill shadow">ĐĂNG NHẬP</button>
        </div>
    </div>
</div>

<div id="loading-screen" class="hidden container py-5 text-center">
    <div class="loader"></div>
    <h4 class="fw-bold text-primary italic">ĐANG TẢI HỆ THỐNG...</h4>
    <p class="text-muted small">Vui lòng chờ giây lát</p>
</div>

<div id="main-app" class="hidden">
    <div class="bg-white p-3 d-flex justify-content-between align-items-center sticky-top shadow-sm">
        <button class="fs-4 border-0 bg-transparent" data-bs-toggle="offcanvas" data-bs-target="#menu">☰</button>
        <span class="small">Chào, <b id="u-display"></b></span>
        <div id="clock-header" class="fw-bold text-primary small"></div>
    </div>
    <div class="p-3" id="main-content">
        <div class="card p-4 text-center shadow-sm border-0" style="border-radius: 20px;">
            <h5 id="date-now" class="text-muted mb-3"></h5>
            <div class="alert alert-danger py-2 px-3 small fw-bold rounded-pill">🔥 KHO SẮP HẾT: <span id="low-count">0</span> món</div>
            <div id="low-stock-list" class="mt-3 text-start"></div>
        </div>
    </div>
</div>

<div class="offcanvas offcanvas-start" id="menu">
    <div class="offcanvas-header bg-dark text-white">
        <h6 class="fw-bold m-0">MENU QUẢN LÝ</h6>
        <button type="button" class="btn-close btn-close-white" data-bs-dismiss="offcanvas"></button>
    </div>
    <div class="offcanvas-body p-0">
        <button class="sidebar-item" onclick="openTab('ban-hang')">🛍️ Bán Hàng</button>
        <button id="nhap-btn-menu" class="sidebar-item hidden" onclick="openTab('nhap-hang')">📦 Nhập Hàng</button>
        <button class="sidebar-item text-danger fw-bold" onclick="openTab('tra-hang')">↩️ Trả Hàng</button>
        <button class="sidebar-item" onclick="openTab('lich-su')">📜 Nhật Ký</button>
        <button class="sidebar-item" onclick="openTab('bao-cao-kho')">📊 Báo Cáo Kho</button>
        <button id="admin-btn-menu" class="sidebar-item hidden bg-secondary text-white fw-bold" onclick="openTab('loi-nhuan')">💰 Tài Chính & Lãi</button>
        <div class="p-3"><button onclick="location.reload()" class="btn btn-outline-secondary btn-sm w-100 rounded-pill">Đăng xuất</button></div>
    </div>
</div>

<script>
    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbwTIQwrYS7oP8XmFtCbmVsz_sXUYTq1c1CdAXaNrwl9eDXq2M_I5_D5K5KpKWJxw69xhw/exec";
    let currentUser = "", currentRole = "", productList = [], historyData = [];

    function fM(n) { return Number(n || 0).toLocaleString('vi-VN') + " đ"; }

    async function login() {
        const u = document.getElementById('u').value.trim();
        const p = document.getElementById('p').value.trim();
        const btn = document.getElementById('btn-login');
        if(!u || !p) return Swal.fire('Thiếu thông tin', '', 'warning');
        
        btn.disabled = true; btn.innerText = "Xác thực...";
        try {
            const r = await fetch(`${SCRIPT_URL}?action=login`, {method: 'POST', body: JSON.stringify({u, p})}).then(res => res.json());
            if(r.status === 'success') {
                currentUser = u; currentRole = r.role;
                document.getElementById('login-box').classList.add('hidden');
                document.getElementById('loading-screen').classList.remove('hidden');

                await Promise.all([refreshProducts(), refreshHistory()]);

                setTimeout(() => {
                    document.getElementById('loading-screen').classList.add('hidden');
                    document.getElementById('main-app').classList.remove('hidden');
                    document.getElementById('u-display').innerText = currentUser;
                    if(currentRole === 'admin') {
                        document.getElementById('admin-btn-menu').classList.remove('hidden');
                        document.getElementById('nhap-btn-menu').classList.remove('hidden');
                    }
                }, 2000);
            } else { Swal.fire('Lỗi', 'Sai mật khẩu!', 'error'); btn.disabled = false; btn.innerText = "ĐĂNG NHẬP"; }
        } catch(e) { Swal.fire('Lỗi mạng', '', 'error'); btn.disabled = false; }
    }

    async function refreshProducts() { productList = await fetch(`${SCRIPT_URL}?action=getProducts`).then(r => r.json()); updateDashboard(); }
    async function refreshHistory() { historyData = await fetch(`${SCRIPT_URL}?action=getHistory`).then(r => r.json()); }

    function updateDashboard() {
        const low = productList.filter(p => p.ton_kho < 5);
        document.getElementById('low-count').innerText = low.length;
        document.getElementById('low-stock-list').innerHTML = low.map(p => `<div class="d-flex justify-content-between border-bottom py-2 small"><span>${p.ten}</span><b class="text-danger">${p.ton_kho}</b></div>`).join('');
    }

    function openTab(name) {
        bootstrap.Offcanvas.getInstance(document.getElementById('menu')).hide();
        const content = document.getElementById('main-content');
        if(['ban-hang', 'nhap-hang', 'tra-hang'].includes(name)) {
            const type = name === 'ban-hang' ? "Bán hàng" : (name === 'nhap-hang' ? "Nhập hàng" : "Khách trả hàng");
            const theme = name === 'ban-hang' ? "ban-theme" : (name === 'nhap-hang' ? "nhap-theme" : "tra-theme");
            content.innerHTML = `<h5 class="fw-bold mb-3">${type}</h5><div id="items-list"></div>
                <button onclick="addRow('${theme}', '${name}')" class="btn btn-outline-secondary w-100 mb-3 py-2">+ Thêm món</button>
                <div class="card p-3 shadow-sm border-0" style="border-radius:15px;">
                    <select id="p-method" class="form-select mb-3"><option value="Tiền mặt">💵 Tiền mặt</option><option value="Chuyển khoản">🏦 Chuyển khoản</option></select>
                    <div class="d-flex justify-content-between mb-3 align-items-center"><span class="fw-bold">TỔNG:</span><span id="total-bill" class="fs-4 fw-bold text-danger">0 đ</span></div>
                    <button id="btn-submit" onclick="submitOrder('${type}')" class="btn btn-lg w-100 fw-bold rounded-pill ${name==='ban-hang'?'btn-success':(name==='nhap-hang'?'btn-primary':'btn-danger')} shadow-sm">XÁC NHẬN</button>
                </div>`;
            addRow(theme, name);
        } else if(name === 'lich-su') { renderHistory(); }
        else if(name === 'bao-cao-kho') { renderStock(); }
        else if(name === 'loi-nhuan') { renderFinance(); }
    }

    function addRow(theme, tabName) {
        const id = Date.now();
        const row = `<div class="order-row ${theme} row g-1" id="row-${id}">
            <div class="col-12 mb-1"><input list="plist" onchange="updateRow(${id}, this.value, '${tabName}')" class="form-control" placeholder="Tên sp..."></div>
            <div class="col-4"><input type="number" id="q-${id}" onchange="calc()" class="form-control text-center" value="1"></div>
            <div class="col-6"><input type="number" id="p-input-${id}" onchange="calc()" class="form-control text-center text-primary fw-bold" value="0"></div>
            <div class="col-2 text-center"><button onclick="this.parentElement.parentElement.remove();calc()" class="btn text-danger">✕</button></div>
            <div class="col-12 text-center small text-muted mt-1" id="s-${id}">Kho: 0</div>
        </div>`;
        document.getElementById('items-list').insertAdjacentHTML('beforeend', row);
        let d = document.getElementById('plist') || document.createElement('datalist');
        d.id = 'plist'; d.innerHTML = productList.map(p => `<option value="${p.ten}">`).join('');
        if(!document.getElementById('plist')) document.body.appendChild(d);
    }

    function updateRow(id, val, tabName) {
        const p = productList.find(x => x.ten === val);
        if(p) {
            document.getElementById(`p-input-${id}`).value = (tabName === 'nhap-hang') ? 0 : p.gia_ban;
            document.getElementById(`s-${id}`).innerText = "Kho: " + p.ton_kho;
        } else {
            document.getElementById(`s-${id}`).innerText = "Sản phẩm mới ✨";
        }
        calc();
    }

    function calc() {
        let t = 0;
        document.querySelectorAll('.order-row').forEach(r => {
            const id = r.id.split('-')[1];
            const q = document.getElementById(`q-${id}`).value;
            const p = document.getElementById(`p-input-${id}`).value;
            t += q * p;
        });
        document.getElementById('total-bill').innerText = fM(t);
    }

    async function submitOrder(type) {
        const items = [];
        document.querySelectorAll('.order-row').forEach(r => {
            const id = r.id.split('-')[1], ten = r.querySelector('input').value, sl = Number(document.getElementById(`q-${id}`).value), gia = Number(document.getElementById(`p-input-${id}`).value);
            if(ten && sl > 0) items.push({ten, sl, gia});
        });
        if(!items.length) return;
        const btn = document.getElementById('btn-submit');
        btn.disabled = true; btn.innerText = "Đang lưu...";
        try {
            await fetch(`${SCRIPT_URL}?action=saveOrder`, {method: 'POST', body: JSON.stringify({user: currentUser, type, method: document.getElementById('p-method').value, items})});
            Swal.fire({title:'Xong!', icon:'success', timer:1000, showConfirmButton:false});
            openTab('ban-hang'); refreshProducts(); refreshHistory();
        } catch(e) { Swal.fire('Lỗi','','error'); btn.disabled = false; }
    }

    function renderFinance() {
        const now = new Date();
        const todayStr = now.toLocaleDateString('vi-VN');
        let dRev = 0, dProfit = 0, dCost = 0, mRev = 0, mProfit = 0, mCost = 0;
        historyData.forEach(x => {
            const d = new Date(x.thoigian);
            const amt = Number(x.thanhtien || 0), lãi = Number(x.loi_nhuan || 0), chi = Number(x["C. Phí Nhập"] || 0);
            if(d.toLocaleDateString('vi-VN') === todayStr) { dRev += amt; dProfit += lãi; dCost += chi; }
            if(d.getMonth() === now.getMonth() && d.getFullYear() === now.getFullYear()) { mRev += amt; mProfit += lãi; mCost += chi; }
        });
        document.getElementById('main-content').innerHTML = `<h5 class="fw-bold mb-3">💰 TÀI CHÍNH</h5><div class="row g-2">
            <div class="col-6"><div class="stat-card"><small>Doanh thu ngày</small><div class="stat-val text-primary">${fM(dRev)}</div></div></div>
            <div class="col-6"><div class="stat-card"><small>Vốn nhập ngày</small><div class="stat-val text-danger">${fM(dCost)}</div></div></div>
            <div class="col-12"><div class="stat-card"><small>Lãi ròng ngày</small><div class="stat-val text-success">${fM(dProfit)}</div></div></div>
            <div class="col-12"><div class="stat-card bg-light"><small>Doanh thu tháng</small><div class="stat-val text-primary">${fM(mRev)}</div></div></div>
            <div class="col-12"><div class="stat-card bg-light"><small>Lợi nhuận ròng tháng</small><div class="stat-val text-success">${fM(mProfit)}</div></div></div>
        </div>`;
    }

    function renderHistory() {
        document.getElementById('main-content').innerHTML = `<h5 class="fw-bold mb-3">📜 Nhật ký đơn hàng</h5>` + 
            [...historyData].reverse().slice(0,10).map(x => `<div class="card p-3 mb-2 border-0 shadow-sm small">
                <div class="d-flex justify-content-between"><b>${x.madon}</b> <span class="badge bg-light text-dark">${x.pt_thanhtoan}</span></div>
                <div class="text-primary">${x.ten_sp} (x${x.sl})</div>
                <div class="text-end fw-bold ${x.thanhtien < 0 ? 'text-danger' : 'text-success'}">${fM(x.thanhtien)}</div>
            </div>`).join('');
    }

    function renderStock() {
        document.getElementById('main-content').innerHTML = `<h5 class="fw-bold mb-3">📊 Báo cáo tồn kho</h5>` + 
            productList.map(p => `<div class="card p-2 px-3 mb-1 border-0 shadow-sm d-flex justify-content-between align-items-center"><span>${p.ten}</span><b class="${p.ton_kho<5?'text-danger':''}">${p.ton_kho}</b></div>`).join('');
    }

    setInterval(() => {
        const n = new Date();
        document.getElementById('clock-header').innerText = n.toLocaleTimeString('vi-VN');
        if(document.getElementById('date-now')) document.getElementById('date-now').innerText = n.toLocaleDateString('vi-VN', {weekday:'long', year:'numeric', month:'long', day:'numeric'});
    }, 1000);
</script>
</body>
</html>
